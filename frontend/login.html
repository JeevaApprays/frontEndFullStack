<!DOCTYPE html>
<html>

<head>
  <title>Login</title>
  <link rel="stylesheet" href="auth.css">
</head>

<body>
  <br><br>
  <table width="100%" height="100%">
    <tr>
      <td align="center" valign="middle">
        <h1>Login Form</h1>

        <form id="login-form">

          <input type="email" id="login-email" placeholder="Email" name="email" required />
          <br><br>

          <input type="password" id="login-password" placeholder="Password" name="password" required />
          <br><br>

          <div id="login-error" style="color:red; margin-bottom:10px; display:none;"></div>

          <button type="submit" id="login-btn">Login</button>
          <br><br>

          <a href="register.html">Don't have an account? Register here</a>

        </form>
      </td>
    </tr>
  </table>

  <script>
    const API_BASE = 'http://localhost:8080';

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errorDiv.style.display = 'none';

      if (!email || !password) {
        errorDiv.textContent = 'Please fill in all fields.';
        errorDiv.style.display = 'block';
        return;
      }

      btn.textContent = 'Logging in...';
      btn.disabled = true;

      try {
        const res = await fetch(API_BASE + '/auth/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorDiv.textContent = data.message || 'Invalid Email or Password.';
          errorDiv.style.display = 'block';
          return;
        }

        // Save token and redirect to dashboard
        localStorage.setItem('jwt_token', data.token);
        localStorage.setItem('user_email', email);
        window.location.href = 'dashboards.html';

      } catch (err) {
        errorDiv.textContent = 'Cannot connect to server. Make sure backend is running on port 8080.';
        errorDiv.style.display = 'block';
      } finally {
        btn.textContent = 'Login';
        btn.disabled = false;
      }
    });

    // If already logged in, go to dashboard
    if (localStorage.getItem('jwt_token')) {
      window.location.href = 'dashboards.html';
    }
  </script>
</body>

</html>
