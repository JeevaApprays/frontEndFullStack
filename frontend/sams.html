<html>
    <head>
        <title>Java Script</title>

        
    </head>

    <body>
        <h1>Hello All Welcome to JS</h1>
        <button id= "greenbt">green</button>
        <button id = "yellowbt">Yellow</button>
        <button id="black">black</button>
<script>

            let green = document.getElementById("greenbt");
            green.addEventListener("click",function(){
                alert("Clicked");
                green.style.backgroundColor="green";
            });


            let yell = document.getElementById("yellowbt");
            yell.addEventListener("click",function(){
                alert("Clicked yellow");
                yell.style.backgroundColor="yellow";
            });

            let black  = document.getElementById("black");
            black.addEventListener("click",function(){
                alert("Black Clicked");
                black.style.backgroundColor="black";
            })

        </script>

    </body>
</html>
