    <script>

        const BASEURL ='http://localhost:8080';


                const token = localStorage.getItem('jwt_token');

      async  function addTrainer(){    // arrow function

            const name =document.getElementById('userName').value.trim();
            const email = document.getElementById('emailid').value;

            if(!name || !email){
                alert("Name and Email must given any value");
                return;
            }
            try{
                const res = await fetch(BASEURL+'/addTrainer',{
                    method:'POST',
                    headers:{'Content-type':'application/json','Authorization':'Bearer '+token},
                    body: JSON.stringify({name:name,email:email})
                });
            
            if(!res.ok){
                alert("Data is not Stored");
                throw new status(res.status);
            }
            
            document.getElementById('dataViewdiv').textContent='Trainer Added Sucessfully';
        }catch(err){
            document.getElementById('dataViewdiv').textContent='Cannot Add Trainer Details';
        }
        }

const logout = () =>{

}

function mthodtoClick(id){
    document.querySelectorAll(".option").forEach(p => p.classList.remove("active"))
